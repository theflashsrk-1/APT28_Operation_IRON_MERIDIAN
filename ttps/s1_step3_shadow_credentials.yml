- name: 'APT28 - IRON MERIDIAN: Shadow Credentials Attack via msDS-KeyCredentialLink (SRV03-APP)'
  description: >-
    Represents abuse of delegated write access on a sensitive Active Directory user
    object to establish an alternate certificate-based authentication path. From
    control of SRV03-APP, the operator targets the svc_adm account by interacting
    with the msDS-KeyCredentialLink attribute, a technique commonly associated with
    Shadow Credentials tradecraft. Successful abuse would enable certificate-backed
    Kerberos authentication without recovering the target account password. Primary
    detection opportunities include directory object modification events and
    certificate-based TGT requests for a service account that does not normally
    authenticate in that manner.
  tactic: privilege-escalation
  technique_id: T1556
  technique_name: Modify Authentication Process
  singleton: false
  repeatable: false
  delete_payload: false
  executors:
  - name: psh
    platform: windows
    command: |-
      $ErrorActionPreference = "SilentlyContinue"

      $root = [ADSI]"LDAP://RootDSE"
      $base = "LDAP://$($root.defaultNamingContext)"
      $searcher = New-Object System.DirectoryServices.DirectorySearcher([ADSI]$base)
      $searcher.Filter = "(&(objectClass=user)(sAMAccountName=svc_adm))"
      @("distinguishedName","memberOf","msDS-KeyCredentialLink") | ForEach-Object {
        [void]$searcher.PropertiesToLoad.Add($_)
      }

      $result = $searcher.FindOne()
      if ($result) {
        $dn = $result.Properties["distinguishedname"][0]
        Write-Host "[+] Target account: $dn" -ForegroundColor Green
        Write-Host "[+] Existing msDS-KeyCredentialLink values: $($result.Properties["msds-keycredentiallink"].Count)" -ForegroundColor Cyan

        $entry = [ADSI]("LDAP://$dn")
        $entry.ObjectSecurity.Access |
          Where-Object { $_.IdentityReference -match "svc_app|CertManagers" } |
          Select-Object IdentityReference, ActiveDirectoryRights, ObjectType, AccessControlType |
          Format-Table -AutoSize | Out-String | Write-Host

        Write-Host "`n[*] Group membership snapshot" -ForegroundColor Cyan
        $result.Properties["memberof"] | Sort-Object | ForEach-Object { Write-Host $_ }
      }
      else {
        Write-Host "[!] Unable to locate svc_adm in the current domain context" -ForegroundColor Red
      }
    code: null
    language: null
    build_target: null
    payloads: []
    uploads: []
    timeout: 180
    parsers: []
    cleanup: []
    variations: []
    additional_info:
      source_host: SRV03-APP.cyberange.local
      source_ip_suffix: .40
      domain: cyberange.local
      dc_host: DC01.cyberange.local
      dc_ip_suffix: .10
      attacking_account:
        username: svc_app
        description: Has WriteProperty on svc_adm msDS-KeyCredentialLink
      target_account:
        username: svc_adm
        dn: 'CN=svc_adm,OU=ServiceAccounts,DC=cyberange,DC=local'
        description: Member of CertManagers, has WriteProperty on CorpAuth template
      acl_details:
        right: WriteProperty
        attribute: msDS-KeyCredentialLink
        attribute_schema_path: 'CN=ms-DS-Key-Credential-Link,CN=Schema,CN=Configuration,DC=cyberange,DC=local'
      attack_outcome: TGT for svc_adm via PKINIT (no password required)
      detection_events:
        - '5136 - Directory Service Object Modified (msDS-KeyCredentialLink)'
        - '4768 - Kerberos TGT request with certificate pre-authentication'
  requirements: []
  id: c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8
